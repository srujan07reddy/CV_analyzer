<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeppiaar Shikshak Login</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #07111f 0%, #0f172a 100%);
        color: #e2e8f0;
      }
      .card {
        width: min(420px, 90vw);
        padding: 32px;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      }
      h1 { margin: 0 0 8px; font-size: 1.7rem; }
      p { color: #cbd5e1; }
      .error {
        margin-bottom: 16px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(248, 113, 113, 0.14);
        color: #fecaca;
        border: 1px solid rgba(248, 113, 113, 0.28);
      }
      form { display: flex; flex-direction: column; gap: 14px; }
      label { font-weight: 600; color: #cbd5e1; }
      input {
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(2, 6, 23, 0.7);
        color: white;
        font-size: 1rem;
      }
      button {
        margin-top: 6px;
        padding: 12px 14px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #06b6d4, #8b5cf6);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      .hint { font-size: 0.9rem; color: #94a3b8; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Jeppiaar Shikshak</h1>
      <p>Administrative access portal</p>
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="{{ url_for('login') }}">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="admin" required />

        <div style="display: flex; align-items: center; gap: 8px; margin: 4px 0 8px 0; user-select: none;">
          <input type="checkbox" id="togglePassword" style="width: 14px; height: 14px; margin: 0; cursor: pointer;" onclick="togglePasswordVisibility()" />
          <label for="togglePassword" style="margin: 0; font-size: 13px; color: #94a3b8; font-weight: normal; cursor: pointer;">Show Password</label>
        </div>

        <button type="submit">Login</button>
      </form>
      <div class="hint">Demo credentials: admin / admin</div>
    </div>
    <script>
      function togglePasswordVisibility() {
        const passwordField = document.getElementById("password");
        const checkbox = document.getElementById("togglePassword");
        passwordField.type = checkbox.checked ? "text" : "password";
      }
    </script>
  </body>
</html>
